# Standalone logging config kept separate from config.yaml so it can be
# swapped independently (e.g. verbose logging for troubleshooting) without
# touching business configuration.

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  rotating_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/app.log
    maxBytes: 5242880
    backupCount: 10
    encoding: utf-8

root:
  level: INFO
  handlers: [console, rotating_file]
